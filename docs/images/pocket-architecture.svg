<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 620" width="100%" height="100%" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <linearGradient id="g-source" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5" /><stop offset="100%" stop-color="#7C3AED" />
    </linearGradient>
    <linearGradient id="g-refine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0EA5E9" /><stop offset="100%" stop-color="#38BDF8" />
    </linearGradient>
    <linearGradient id="g-transform" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB" /><stop offset="100%" stop-color="#3B82F6" />
    </linearGradient>
    <linearGradient id="g-load" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#059669" /><stop offset="100%" stop-color="#10B981" />
    </linearGradient>
    <linearGradient id="g-serve" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D97706" /><stop offset="100%" stop-color="#F59E0B" />
    </linearGradient>
    <linearGradient id="g-graph" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9333EA" /><stop offset="100%" stop-color="#C026D3" />
    </linearGradient>
    <filter id="shadow" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000000" flood-opacity="0.12" />
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#475569" />
    </marker>
  </defs>

  <rect width="100%" height="100%" fill="#F8FAFC" rx="18" />

  <text x="500" y="42" text-anchor="middle" font-size="25" font-weight="bold" fill="#0F172A">🧬 Pocket Knowledge Ops — Target = F(Source)</text>
  <text x="500" y="68" text-anchor="middle" font-size="14" fill="#64748B">Declarative · Incremental (Δ-only) · Local-First · Source → Refine → Transform → Load → Serve</text>

  <!-- ===== 1. Source ===== -->
  <g transform="translate(20, 100)" filter="url(#shadow)">
    <rect width="176" height="300" rx="12" fill="url(#g-source)" />
    <text x="88" y="32" text-anchor="middle" font-size="15" font-weight="bold" fill="#FFFFFF">1 · Source</text>
    <text x="88" y="50" text-anchor="middle" font-size="10" fill="#E0E7FF">LocalFS connector</text>
    <g transform="translate(16, 66)">
      <rect width="144" height="52" rx="8" fill="#FFFFFF" fill-opacity="0.16" stroke="#FFFFFF" stroke-opacity="0.5" />
      <text x="72" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#FFFFFF">notes/*.md, *.txt</text>
      <text x="72" y="39" text-anchor="middle" font-size="9" fill="#E0E7FF">Markdown / prose</text>
    </g>
    <g transform="translate(16, 130)">
      <rect width="144" height="52" rx="8" fill="#FFFFFF" fill-opacity="0.16" stroke="#FFFFFF" stroke-opacity="0.5" />
      <text x="72" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#FFFFFF">code: .py .rs .ts</text>
      <text x="72" y="39" text-anchor="middle" font-size="9" fill="#E0E7FF">.js .go .java …</text>
    </g>
    <g transform="translate(16, 222)">
      <rect width="144" height="52" rx="8" fill="#4338CA" />
      <text x="72" y="22" text-anchor="middle" font-size="11" font-weight="bold" fill="#FFFFFF">File Watcher</text>
      <text x="72" y="39" text-anchor="middle" font-size="9" fill="#C7D2FE">Live mode · Δ-only</text>
    </g>
  </g>

  <!-- ===== 2. Refine ===== -->
  <g transform="translate(216, 100)" filter="url(#shadow)">
    <rect width="176" height="300" rx="12" fill="url(#g-refine)" />
    <text x="88" y="32" text-anchor="middle" font-size="15" font-weight="bold" fill="#FFFFFF">2 · Refine</text>
    <text x="88" y="50" text-anchor="middle" font-size="10" fill="#E0F2FE">TextRefiner</text>
    <g transform="translate(16, 66)">
      <rect width="144" height="68" rx="8" fill="#FFFFFF" />
      <text x="72" y="24" text-anchor="middle" font-size="11" font-weight="bold" fill="#075985">Normalize</text>
      <text x="72" y="41" text-anchor="middle" font-size="9" fill="#0369A1">NFC · CRLF→LF</text>
      <text x="72" y="56" text-anchor="middle" font-size="9" fill="#0369A1">whitespace · blank lines</text>
    </g>
    <g transform="translate(16, 146)">
      <rect width="144" height="68" rx="8" fill="#FFFFFF" />
      <text x="72" y="24" text-anchor="middle" font-size="11" font-weight="bold" fill="#075985">Offset map</text>
      <text x="72" y="41" text-anchor="middle" font-size="9" fill="#0369A1">lineage → original bytes</text>
      <text x="72" y="56" text-anchor="middle" font-size="9" fill="#0369A1">code: indent-preserving</text>
    </g>
  </g>

  <!-- ===== 3. Transform ===== -->
  <g transform="translate(412, 100)" filter="url(#shadow)">
    <rect width="176" height="300" rx="12" fill="url(#g-transform)" />
    <text x="88" y="32" text-anchor="middle" font-size="15" font-weight="bold" fill="#FFFFFF">3 · Transform</text>
    <text x="88" y="50" text-anchor="middle" font-size="10" fill="#DBEAFE">PocketIndex ETL</text>
    <g transform="translate(16, 64)">
      <rect width="144" height="58" rx="8" fill="#FFFFFF" />
      <text x="72" y="23" text-anchor="middle" font-size="11" font-weight="bold" fill="#1E3A8A">RecursiveSplitter</text>
      <text x="72" y="40" text-anchor="middle" font-size="9" fill="#3B82F6">code-aware boundaries</text>
    </g>
    <g transform="translate(16, 134)">
      <rect width="144" height="58" rx="8" fill="#FFFFFF" />
      <text x="72" y="23" text-anchor="middle" font-size="11" font-weight="bold" fill="#1E3A8A">SentenceTransformer</text>
      <text x="72" y="40" text-anchor="middle" font-size="9" fill="#3B82F6">Qwen3-Embedding-0.6B (+ SigLIP2 opt-in)</text>
    </g>
    <g transform="translate(16, 204)">
      <rect width="144" height="58" rx="8" fill="#FFFFFF" />
      <text x="72" y="23" text-anchor="middle" font-size="11" font-weight="bold" fill="#1E3A8A">IdGenerator</text>
      <text x="72" y="40" text-anchor="middle" font-size="9" fill="#3B82F6">deterministic IDs · memo</text>
    </g>
  </g>

  <!-- ===== 4. Load ===== -->
  <g transform="translate(608, 100)" filter="url(#shadow)">
    <rect width="176" height="300" rx="12" fill="url(#g-load)" />
    <text x="88" y="32" text-anchor="middle" font-size="15" font-weight="bold" fill="#FFFFFF">4 · Load</text>
    <text x="88" y="50" text-anchor="middle" font-size="10" fill="#D1FAE5">SQLite target</text>
    <g transform="translate(16, 64)">
      <rect width="144" height="56" rx="8" fill="#FFFFFF" />
      <text x="72" y="23" text-anchor="middle" font-size="11" font-weight="bold" fill="#065F46">sqlite-vec</text>
      <text x="72" y="40" text-anchor="middle" font-size="9" fill="#059669">vector · cosine</text>
    </g>
    <g transform="translate(16, 130)">
      <rect width="144" height="56" rx="8" fill="#FFFFFF" />
      <text x="72" y="23" text-anchor="middle" font-size="11" font-weight="bold" fill="#065F46">FTS5 index</text>
      <text x="72" y="40" text-anchor="middle" font-size="9" fill="#059669">lexical · BM25</text>
    </g>
    <g transform="translate(16, 196)">
      <rect width="144" height="56" rx="8" fill="#047857" />
      <text x="72" y="23" text-anchor="middle" font-size="11" font-weight="bold" fill="#FFFFFF">lineage · memo</text>
      <text x="72" y="40" text-anchor="middle" font-size="9" fill="#A7F3D0">auto-sync &amp; cleanup</text>
    </g>
  </g>

  <!-- ===== 5. Serve ===== -->
  <g transform="translate(804, 100)" filter="url(#shadow)">
    <rect width="176" height="300" rx="12" fill="url(#g-serve)" />
    <text x="88" y="32" text-anchor="middle" font-size="15" font-weight="bold" fill="#FFFFFF">5 · Serve</text>
    <text x="88" y="50" text-anchor="middle" font-size="10" fill="#FEF3C7">retrieval.py</text>
    <g transform="translate(16, 66)">
      <rect width="144" height="80" rx="8" fill="#FFFFFF" />
      <text x="72" y="24" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400E">Hybrid retrieval</text>
      <text x="72" y="42" text-anchor="middle" font-size="9" fill="#B45309">vector + lexical (+ graph)</text>
      <text x="72" y="58" text-anchor="middle" font-size="9" fill="#B45309">Reciprocal Rank Fusion</text>
      <text x="72" y="73" text-anchor="middle" font-size="9" fill="#B45309">mode: hybrid·vector·lexical</text>
    </g>
    <g transform="translate(16, 160)">
      <rect width="144" height="92" rx="8" fill="#FFFFFF" fill-opacity="0.18" stroke="#FFFFFF" stroke-opacity="0.55" />
      <text x="72" y="22" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">Surfaces</text>
      <text x="72" y="40" text-anchor="middle" font-size="9" fill="#FFF7ED">CLI · pocket search</text>
      <text x="72" y="56" text-anchor="middle" font-size="9" fill="#FFF7ED">MCP · pocket-mcp</text>
      <text x="72" y="72" text-anchor="middle" font-size="9" fill="#FFF7ED">REST + Web UI · pocket serve</text>
    </g>
  </g>

  <!-- pipeline arrows -->
  <path d="M 196 250 L 216 250" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)" />
  <path d="M 392 250 L 412 250" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)" />
  <path d="M 588 250 L 608 250" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)" />
  <path d="M 784 250 L 804 250" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)" />

  <!-- ===== Optional: Knowledge Graph branch ===== -->
  <g transform="translate(412, 440)" filter="url(#shadow)">
    <rect width="372" height="74" rx="12" fill="url(#g-graph)" />
    <text x="186" y="28" text-anchor="middle" font-size="13" font-weight="bold" fill="#FFFFFF">Optional branch · Knowledge Graph (GraphRAG)</text>
    <text x="186" y="46" text-anchor="middle" font-size="10" fill="#F5D0FE">pocket update --graph · extractor: deterministic | ollama | airllm</text>
    <text x="186" y="62" text-anchor="middle" font-size="10" fill="#F5D0FE">entities + relations tables · same Δ lineage/memo sweep · pocket graph "…"</text>
  </g>
  <!-- transform feeds graph extraction, graph loads into target, graph augments serve -->
  <path d="M 500 400 L 500 440" fill="none" stroke="#9333EA" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#arrow)" />
  <path d="M 696 440 L 696 412" fill="none" stroke="#9333EA" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#arrow)" />
  <path d="M 784 477 L 880 477 L 880 400" fill="none" stroke="#9333EA" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#arrow)" />

  <!-- ===== Evaluation harness ===== -->
  <g transform="translate(20, 440)" filter="url(#shadow)">
    <rect width="372" height="74" rx="12" fill="#FFFFFF" stroke="#CBD5E1" />
    <text x="186" y="28" text-anchor="middle" font-size="13" font-weight="bold" fill="#334155">Regression harness · pocket eval</text>
    <text x="186" y="46" text-anchor="middle" font-size="10" fill="#64748B">Hit@k · MRR · Precision/Recall@k · MAP over the same search path</text>
    <text x="186" y="62" text-anchor="middle" font-size="10" fill="#64748B">synthetic or gold cases · baseline compare fails CI on a drop</text>
  </g>
  <path d="M 240 440 L 240 400" fill="none" stroke="#94A3B8" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow)" />

  <text x="500" y="556" text-anchor="middle" font-size="11" fill="#94A3B8">Self-contained vendored engine (pocketindex) — no external pip ETL dependency</text>
</svg>
